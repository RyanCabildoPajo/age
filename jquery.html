<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Age Checker</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <h2>Enter Birth Year</h2>
    <input type="number" id="birthyear" placeholder="e.g. 2001"><br>
    <button id="checkBtn">Check</button>
<script>
    $("#checkBtn").click(function () {
        let birthyear = $("#birthyear").val();
        let currentYear = new Date().getFullYear();
        let age = currentYear - birthyear;
        let category = "";
            try {
                if (age >= 0 && age <= 3) {
                    category = "Baby";
                } else if (age <= 12) {
                    category = "Kid";   
                } else if (age <= 19) {
                    category = "Teenager";
                } else if (age <= 29) {
                    category = "Young";
                } else {
                    category = "Adult";
                } 

                let message = ` 
                Birthyear: ${birthyear}<br>
                Age: ${age}<br>
                Category: ${category}`;

                if (age >= 0 && age <= 19) {
                    Swal.fire({icon: 'error',title: 'Not Eligible',html: message});
                } else {
                    Swal.fire({icon: 'success',title: 'Eligible',html: message});
                }
            } catch (error){
                Swal.fire({icon: 'error', title: 'Error', Text: error.message});
            }
        });
</script>
</body>
</html>
